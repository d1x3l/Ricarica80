<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ricarica 80% – Dacia Spring</title>
  <link rel="shortcut icon" href="icons/icon-192.png" type="image/png">
  <link rel="icon" href="icons/icon-192.png" sizes="192x192">
  <link rel="icon" href="icons/icon-512.png" sizes="512x512">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#12090a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ricarica 80%">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    /* ── THEME TOKENS ── */
    :root {
      /* Spring (arancio) — default */
      --c0:  #12090a;
      --c1:  #1c0f0a;
      --c2:  #251510;
      --bdr: rgba(255,130,60,0.13);
      --txt: #fff0e8;
      --mut: rgba(255,210,180,0.45);
      --acc: #ff5e1a;
      --ac2: #ff8c42;
      --amb: #ffb830;
      --grd-a: rgba(255,94,26,0.03);
      --orb:   rgba(255,80,20,0.09);
      --glow-car: rgba(255,60,0,0.35);
      --glow-floor: rgba(255,94,26,0.07);
      --arc1: #ffb830;
      --arc2: #ff5e1a;
    }
    :root.grey {
      /* Altro modello (grigio neutro) */
      --c0:  #111113;
      --c1:  #1a1a1e;
      --c2:  #222228;
      --bdr: rgba(180,180,200,0.1);
      --txt: #e8eaf0;
      --mut: rgba(180,190,210,0.45);
      --acc: #7c8caa;
      --ac2: #9aa8c0;
      --amb: #b0bdd4;
      --grd-a: rgba(140,150,180,0.025);
      --orb:   rgba(100,110,150,0.07);
      --glow-car: rgba(80,90,120,0.2);
      --glow-floor: rgba(100,110,150,0.05);
      --arc1: #8898b8;
      --arc2: #5a6888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--c0);
      color: var(--txt);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 24px 16px 60px;
      overflow-x: hidden;
      transition: background 0.5s ease;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        linear-gradient(var(--grd-a) 1px, transparent 1px),
        linear-gradient(90deg, var(--grd-a) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none; z-index: 0;
      transition: background 0.5s;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, var(--orb) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
      transition: background 0.5s;
    }

    .app {
      position: relative; z-index: 1;
      width: 100%; max-width: 430px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .app > * { opacity: 0; animation: up 0.55s ease forwards; }
    .app > *:nth-child(1) { animation-delay: 0.00s; }
    .app > *:nth-child(2) { animation-delay: 0.07s; }
    .app > *:nth-child(3) { animation-delay: 0.13s; }
    .app > *:nth-child(4) { animation-delay: 0.19s; }
    .app > *:nth-child(5) { animation-delay: 0.25s; }
    .app > *:nth-child(6) { animation-delay: 0.31s; }
    @keyframes up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ── */
    .header { text-align: center; padding: 4px 0 2px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,94,26,0.12);
      border: 1px solid rgba(255,94,26,0.28);
      border-radius: 100px; padding: 5px 14px;
      font-size: 10.5px; font-weight: 600;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--ac2); margin-bottom: 12px;
      transition: color 0.4s, border-color 0.4s, background 0.4s;
    }
    :root.grey .badge {
      background: rgba(150,160,190,0.1);
      border-color: rgba(150,160,190,0.25);
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px; font-weight: 800; line-height: 1.08;
      background: linear-gradient(140deg, #fff5f0 20%, var(--acc) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 7px;
    }
    :root.grey h1 { background: linear-gradient(140deg, #e8eaf0 20%, #6a7890 100%);
      -webkit-background-clip: text; background-clip: text; }
    .subtitle { color: var(--mut); font-size: 13.5px; line-height: 1.65; transition: color 0.4s; }

    /* ── CAR CARD ── */
    .car-card {
      background: var(--c1);
      border: 1px solid var(--bdr);
      border-radius: 26px; overflow: hidden;
      position: relative; min-height: 190px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.5s, border-color 0.5s;
    }
    .car-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--acc), transparent);
      opacity: 0.5; z-index: 2;
      transition: background 0.5s;
    }
    .car-floor {
      position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
      background: linear-gradient(to top, var(--glow-floor), transparent);
      z-index: 1; transition: background 0.5s;
    }
    .car-glow {
      position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
      width: 300px; height: 80px;
      background: radial-gradient(ellipse, var(--glow-car) 0%, transparent 70%);
      z-index: 1; transition: background 0.5s;
    }
    .car-scene {
      position: relative; z-index: 3;
      width: 100%; display: flex; align-items: flex-end; justify-content: center;
      padding: 20px 10px 18px;
    }
    #carSpring {
      filter: drop-shadow(0 10px 24px var(--glow-car)) drop-shadow(0 2px 6px rgba(0,0,0,0.5));
      animation: carFloat 3.5s ease-in-out infinite;
    }
    #carGeneric {
      filter: drop-shadow(0 8px 18px rgba(100,110,150,0.2)) drop-shadow(0 2px 6px rgba(0,0,0,0.4));
      animation: carFloat 3.5s ease-in-out infinite;
      display: none;
    }
    @keyframes carFloat {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-5px); }
    }
    .sparks { position: absolute; inset: 0; pointer-events: none; z-index: 4; overflow: hidden; }
    .spark {
      position: absolute; width: 3px; height: 3px; border-radius: 50%;
      background: var(--ac2);
      animation: sparkAnim var(--d,2s) var(--delay,0s) ease-in-out infinite;
      opacity: 0; left: var(--x,50%); bottom: var(--y,30%);
    }
    @keyframes sparkAnim {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      20%  { opacity: 0.85; }
      100% { opacity: 0; transform: translateY(-42px) scale(0.2); }
    }
    .car-label {
      position: absolute; bottom: 10px; left: 16px;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,210,180,0.3); z-index: 5; transition: color 0.4s;
    }
    :root.grey .car-label { color: rgba(170,180,210,0.3); }
    .car-model-name {
      position: absolute; top: 14px; right: 16px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
      color: rgba(255,255,255,0.16); z-index: 5;
    }

    /* ── GAUGE ── */
    .gauge-card {
      background: var(--c1); border: 1px solid var(--bdr);
      border-radius: 26px; padding: 26px 20px 20px;
      display: flex; flex-direction: column; align-items: center;
      position: relative; overflow: hidden;
      transition: background 0.5s, border-color 0.5s;
    }
    .gauge-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--acc), transparent);
      opacity: 0.45; transition: background 0.5s;
    }
    .arc-svg { width: 230px; height: 126px; overflow: visible; }
    .arc-track { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 14; stroke-linecap: round; }
    .arc-fill  { fill: none; stroke: url(#arcGrad); stroke-width: 14; stroke-linecap: round; }
    .arc-tick  { fill: none; stroke: var(--amb); stroke-width: 4; stroke-linecap: round; transition: stroke 0.4s; }
    .gauge-center { margin-top: -8px; text-align: center; }
    .gauge-num {
      font-family: 'Syne', sans-serif; font-size: 54px; font-weight: 800; line-height: 1;
      color: var(--acc); text-shadow: 0 0 28px rgba(255,94,26,0.35); transition: color 0.4s, text-shadow 0.4s;
    }
    :root.grey .gauge-num { text-shadow: 0 0 28px rgba(100,120,160,0.3); }
    .gauge-label-sub { font-size: 12px; color: var(--mut); margin-top: 4px; transition: color 0.4s; }
    .gauge-target-note {
      margin-top: 8px;
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,184,48,0.09); border: 1px solid rgba(255,184,48,0.2);
      border-radius: 100px; padding: 4px 12px;
      font-size: 11px; font-weight: 600; color: var(--amb);
      transition: all 0.4s;
    }
    :root.grey .gauge-target-note {
      background: rgba(140,158,190,0.09); border-color: rgba(140,158,190,0.2);
    }

    /* ── FORM ── */
    .form-card {
      background: var(--c1); border: 1px solid var(--bdr);
      border-radius: 26px; padding: 22px 20px 20px;
      transition: background 0.5s, border-color 0.5s;
    }
    .section-label {
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--mut); margin-bottom: 16px; transition: color 0.4s;
    }
    .sel-wrap { position: relative; margin-bottom: 18px; }
    .sel-wrap select {
      width: 100%; appearance: none;
      background: rgba(255,255,255,0.04); border: 1px solid var(--bdr);
      border-radius: 14px; color: var(--txt);
      font-family: 'DM Sans', sans-serif; font-size: 14.5px;
      padding: 13px 42px 13px 16px;
      cursor: pointer; outline: none; transition: border-color 0.2s;
    }
    .sel-wrap select:focus { border-color: var(--acc); }
    .sel-wrap::after {
      content: '▾'; position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%); color: var(--mut); pointer-events: none; font-size: 12px;
    }
    .cap-row { display: none; align-items: center; gap: 10px; margin-bottom: 18px; }
    .cap-row.on { display: flex; }
    .cap-row input {
      flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--bdr);
      border-radius: 14px; color: var(--txt);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      padding: 13px 16px; outline: none; transition: border-color 0.2s;
    }
    .cap-row input:focus { border-color: var(--acc); }
    .cap-row span { font-size: 13px; color: var(--mut); }

    .field { margin-bottom: 22px; }
    .field:last-child { margin-bottom: 0; }
    .field-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .field-lbl { font-size: 13px; font-weight: 500; color: var(--mut); transition: color 0.4s; }
    .field-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--txt); }
    .field-val span { font-size: 14px; font-weight: 400; color: var(--mut); margin-left: 2px; }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px; border-radius: 100px; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
      background: var(--acc); box-shadow: 0 0 14px color-mix(in srgb, var(--acc) 60%, transparent);
      cursor: pointer; transition: transform 0.12s;
    }
    input[type="range"]:active::-webkit-slider-thumb { transform: scale(1.22); }
    input[type="range"]::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--acc); border: none; cursor: pointer;
    }
    #percSlider {
      background: linear-gradient(to right, var(--ac2) var(--fp,43%), rgba(255,255,255,0.07) var(--fp,43%));
    }
    #kwSlider {
      background: linear-gradient(to right, var(--acc) var(--fk,13%), rgba(255,255,255,0.07) var(--fk,13%));
    }

    /* power toggle */
    .power-toggle {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; cursor: pointer; width: fit-content;
    }
    .power-toggle input { display: none; }
    .toggle-pill {
      width: 36px; height: 20px; border-radius: 100px;
      background: rgba(255,255,255,0.1); border: 1px solid var(--bdr);
      position: relative; transition: background 0.25s;
      flex-shrink: 0;
    }
    .toggle-pill::after {
      content: ''; position: absolute;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--mut); top: 2px; left: 2px;
      transition: transform 0.22s, background 0.22s;
    }
    .power-toggle input:checked + .toggle-pill { background: rgba(255,94,26,0.25); }
    :root.grey .power-toggle input:checked + .toggle-pill { background: rgba(100,120,160,0.25); }
    .power-toggle input:checked + .toggle-pill::after { transform: translateX(16px); background: var(--acc); }
    .toggle-label { font-size: 12.5px; color: var(--mut); font-weight: 500; transition: color 0.4s; }

    .kw-field { display: none; }
    .kw-field.on { display: block; }

    /* ── CTA ── */
    .cta {
      width: 100%; padding: 19px;
      background: linear-gradient(130deg, var(--acc) 0%, var(--ac2) 100%);
      color: #fff;
      font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; letter-spacing: 0.02em;
      border: none; border-radius: 20px; cursor: pointer;
      box-shadow: 0 4px 28px color-mix(in srgb, var(--acc) 45%, transparent);
      transition: transform 0.16s, box-shadow 0.16s, filter 0.16s, background 0.4s;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    }
    .cta:hover  { transform: translateY(-2px); filter: brightness(1.08); }
    .cta:active { transform: scale(0.97); filter: brightness(0.9); }

    /* ── RESULT ── */
    .result {
      background: var(--c1); border: 1px solid color-mix(in srgb, var(--acc) 30%, transparent);
      border-radius: 26px; padding: 0 20px;
      display: none; flex-direction: column;
      position: relative; overflow: hidden;
      transition: background 0.5s, border-color 0.5s;
    }
    .result.show { display: flex; animation: pop 0.45s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .result::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% -20%, color-mix(in srgb, var(--acc) 10%, transparent), transparent 65%);
      pointer-events: none;
    }
    .res-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 17px 0; border-bottom: 1px solid var(--bdr);
    }
    .res-row:last-child { border-bottom: none; }
    .res-lbl {
      display: flex; align-items: center; gap: 8px;
      font-size: 11.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--mut); transition: color 0.4s;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--acc);
      animation: blink 1.5s ease-in-out infinite; transition: background 0.4s;
    }
    @keyframes blink {
      0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--acc) 80%, transparent); }
      50%      { box-shadow: 0 0 0 5px transparent; }
    }
    .res-val {
      font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; color: var(--acc);
      text-shadow: 0 0 20px color-mix(in srgb, var(--acc) 35%, transparent);
      transition: color 0.4s;
    }
    .res-val.neutral { color: var(--txt); text-shadow: none; }
    .res-val.small { font-size: 22px; color: var(--mut); }
    .res-note {
      font-size: 11px; color: var(--mut); text-align: center;
      padding: 10px 4px 18px; line-height: 1.6; display: none; transition: color 0.4s;
    }
    .res-note.on { display: block; }

    .foot {
      text-align: center; font-size: 10.5px; color: rgba(200,190,180,0.18);
      padding-top: 2px; transition: color 0.4s;
    }
    :root.grey .foot { color: rgba(160,170,200,0.18); }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="badge">⚡ EV Charger</div>
    <h1>Ricarica<br>all'80%</h1>
    <p class="subtitle">Proteggi la batteria. Calcola l'orario esatto<br>in cui staccare la spina.</p>
  </header>

  <!-- CAR SHOWCASE -->
  <div class="car-card">
    <div class="car-glow"></div>
    <div class="car-floor"></div>
    <div class="sparks" id="sparks"></div>

    <div class="car-scene">

      <!-- ══ DACIA SPRING SVG ══ -->
      <svg id="carSpring" xmlns="http://www.w3.org/2000/svg"
           viewBox="0 0 520 215" width="360" height="148">
        <defs>
          <linearGradient id="bodyTop" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#ff8040"/>
            <stop offset="55%"  stop-color="#ff4e10"/>
            <stop offset="100%" stop-color="#c83400"/>
          </linearGradient>
          <linearGradient id="bodyRight" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="rgba(0,0,0,0)" />
            <stop offset="100%" stop-color="rgba(0,0,0,0.28)"/>
          </linearGradient>
          <linearGradient id="roofG" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#ff9050"/>
            <stop offset="100%" stop-color="#e04000"/>
          </linearGradient>
          <linearGradient id="windG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#d8eeff" stop-opacity="0.52"/>
            <stop offset="100%" stop-color="#90c0e8" stop-opacity="0.22"/>
          </linearGradient>
          <linearGradient id="swinG" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#b8d8f8" stop-opacity="0.48"/>
            <stop offset="100%" stop-color="#80b0d8" stop-opacity="0.18"/>
          </linearGradient>
          <radialGradient id="whlG" cx="40%" cy="38%" r="55%">
            <stop offset="0%"   stop-color="#555"/>
            <stop offset="100%" stop-color="#111"/>
          </radialGradient>
          <filter id="ds">
            <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
          </filter>
        </defs>

        <!-- ground shadow -->
        <ellipse cx="258" cy="207" rx="188" ry="10" fill="rgba(0,0,0,0.32)"/>

        <!-- ── BODY ── -->
        <!-- Main side panel -->
        <path d="M 72 152 L 92 118 L 400 118 L 422 152 Z"
              fill="url(#bodyTop)" filter="url(#ds)"/>
        <!-- Roof + pillars -->
        <path d="M 148 118 L 172 72 L 198 56 L 328 56 L 358 72 L 382 118 Z"
              fill="url(#roofG)"/>
        <!-- Right-side depth shading -->
        <path d="M 72 152 L 92 118 L 400 118 L 422 152 Z"
              fill="url(#bodyRight)" opacity="0.45"/>
        <!-- Hood slope -->
        <path d="M 72 152 L 92 118 L 152 118 L 145 148 Z" fill="#d03800"/>
        <!-- Boot slope -->
        <path d="M 400 118 L 422 152 L 410 152 L 392 128 Z" fill="#bb3200"/>

        <!-- Lower cladding / skirt -->
        <rect x="76" y="148" width="342" height="11" rx="2.5" fill="#2c2c2c"/>
